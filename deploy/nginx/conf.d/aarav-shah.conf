server {
    listen 80;
    server_name aarav-shah.com www.aarav-shah.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Root: Portfolio/CV placeholder
    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    # F1 Insights (Next.js on 3000)
    location /f1-insights/ {
        proxy_pass http://127.0.0.1:3000/f1-insights/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # F1 Insights static assets
    location /f1-insights/_next/ {
        proxy_pass http://127.0.0.1:3000/f1-insights/_next/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        
        # Cache static assets
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # FastAPI backend
    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts for API
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 120s;
    }

    # API health check
    location /api/health {
        proxy_pass http://127.0.0.1:8000/health;
        access_log off;
    }
}
