name: Deploy to EC2

# Deploy the application to EC2 instance via SSH
# Triggers after images are published to GHCR or manually
on:
  workflow_dispatch:  # Allow manual trigger
  workflow_run:
    workflows: ["Publish Docker Images"]
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    # Only run if the publish workflow succeeded (or if manually triggered)
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug environment
        shell: bash
        run: |
          echo "=== Environment Debug Info ==="
          echo "User: $(whoami)"
          echo "User ID: $(id)"
          echo "Current directory: $(pwd)"
          echo "HOME: ${HOME}"
          echo "Listing HOME directory:"
          ls -la "${HOME}" || echo "Cannot list HOME"
          echo "Listing /home:"
          ls -la /home || echo "Cannot list /home"
          echo "Disk usage:"
          df -h

      - name: Free disk space
        shell: bash
        run: |
          echo "=== Cleaning up Docker resources ==="
          docker system prune -af || true
          docker builder prune -af || true
          echo "Disk usage after cleanup:"
          df -h

      - name: Validate secrets
        shell: bash
        run: |
          echo "Validating required secrets..."
          if [ -z "${{ secrets.EC2_HOST }}" ]; then
            echo "Error: EC2_HOST secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.EC2_SSH_KEY }}" ]; then
            echo "Error: EC2_SSH_KEY secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.EC2_USER }}" ]; then
            echo "Error: EC2_USER secret is not set"
            exit 1
          fi
          echo "All required secrets are configured"

      - name: Network diagnostics
        shell: bash
        run: |
          echo "=== Network Diagnostics ==="
          echo "Target host: ${{ secrets.EC2_HOST }}"
          
          # DNS Resolution
          echo ""
          echo "1. DNS Resolution:"
          RESOLVED_IP=""
          if command -v getent &> /dev/null; then
            echo "   Using getent for DNS lookup..."
            RESOLVED_IP=$(getent hosts "${{ secrets.EC2_HOST }}" 2>&1 | awk '{ print $1 }' | head -n1)
          elif command -v nslookup &> /dev/null; then
            echo "   Using nslookup for DNS lookup..."
            RESOLVED_IP=$(nslookup "${{ secrets.EC2_HOST }}" 2>&1 | grep -A1 'Name:' | tail -n1 | awk '{ print $2 }')
          else
            echo "   Warning: No DNS lookup tool available (getent/nslookup)"
          fi
          
          if [ -n "$RESOLVED_IP" ] && echo "$RESOLVED_IP" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "   Resolved to: $RESOLVED_IP"
            
            # Check if IP is private
            if echo "$RESOLVED_IP" | grep -qE '^(10\.|172\.(1[6-9]|2[0-9]|3[0-1])\.|192\.168\.)'; then
              echo ""
              echo "   ⚠️  WARNING: Host resolves to PRIVATE IP address: $RESOLVED_IP"
              echo "   ⚠️  GitHub-hosted runners cannot reach private networks"
              echo ""
              echo "   Required Solutions (choose one):"
              echo "     1. [PREFERRED] Use self-hosted runner in same VPC"
              echo "        - Add 'runs-on: self-hosted' to this job"
              echo "     2. [PREFERRED] Use AWS SSM Session Manager instead of SSH"
              echo "        - Replace SSH with aws ssm start-session"
              echo "     3. Assign public Elastic IP and open security group"
              echo "        - Not recommended for production (SSH publicly exposed)"
              echo ""
              echo "   This workflow will fail unless connectivity is established."
              echo "   Proceeding with diagnostics to confirm..."
            else
              echo "   ✓ Host resolves to public IP"
            fi
          else
            echo "   ⚠️  Could not resolve to valid IP address"
            echo "   DNS response: $RESOLVED_IP"
          fi
          
          # TCP Connectivity Test
          echo ""
          echo "2. TCP Connectivity Test (SSH port 22):"
          TCP_TEST_RESULT="failed"
          
          if timeout 5 bash -c "echo 2>/dev/null >/dev/tcp/${{ secrets.EC2_HOST }}/22" 2>/dev/null; then
            echo "   ✓ Port 22 is reachable"
            TCP_TEST_RESULT="success"
          else
            TCP_EXIT=$?
            echo "   ✗ Cannot connect to port 22 (exit code: $TCP_EXIT)"
            echo ""
            echo "   Common causes:"
            echo "     - Host is on private network (VPC) without public IP"
            echo "     - Security group doesn't allow SSH from GitHub Actions IP ranges"
            echo "     - Network ACL or firewall blocking connection"
            echo "     - EC2 instance is stopped or terminated"
            echo ""
            echo "   Next steps:"
            echo "     - If private IP: Use self-hosted runner or AWS SSM"
            echo "     - If public IP: Update security group to allow GitHub IPs"
            echo "       (See: https://api.github.com/meta for GitHub IP ranges)"
          fi
          
          # Ping test (optional, many hosts block ICMP)
          echo ""
          echo "3. ICMP Ping Test (optional diagnostic):"
          if ping -c 3 -W 5 "${{ secrets.EC2_HOST }}" &> /dev/null; then
            echo "   ✓ Host responds to ping"
          else
            echo "   ✗ Host does not respond to ping (may be blocked by firewall)"
          fi
          
          echo ""
          echo "==============================="
          echo "Network diagnostics complete"
          
          # Determine if we should fail early
          if [ -n "$RESOLVED_IP" ] && echo "$RESOLVED_IP" | grep -qE '^(10\.|172\.(1[6-9]|2[0-9]|3[0-1])\.|192\.168\.)'; then
            if [ "$TCP_TEST_RESULT" = "failed" ]; then
              echo ""
              echo "❌ FATAL: Host is private AND port 22 is unreachable"
              echo "❌ GitHub-hosted runner cannot connect to this host"
              echo ""
              echo "Please implement one of the solutions:"
              echo "  1. Switch to self-hosted runner (add to .github/workflows/deploy-ec2.yml):"
              echo "     jobs:"
              echo "       deploy:"
              echo "         runs-on: self-hosted"
              echo ""
              echo "  2. Use AWS SSM instead of SSH (preferred for private hosts):"
              echo "     - Install AWS CLI and configure credentials"
              echo "     - Replace SSH commands with: aws ssm start-session --target <instance-id>"
              echo ""
              exit 1
            fi
          fi

      - name: Setup SSH key
        shell: bash
        run: |
          # Ensure HOME is set and writable
          if [ -z "${HOME}" ] || [ ! -w "${HOME}" ]; then
            echo "HOME is not set or not writable, using fallback"
            if [ -w "/home/runner" ]; then
              export HOME="/home/runner"
            else
              export HOME="/tmp"
            fi
            echo "Using HOME=${HOME}"
          fi
          
          # Create SSH directory with explicit permissions
          echo "Creating SSH directory..."
          mkdir -p "${HOME}/.ssh"
          chmod 700 "${HOME}/.ssh"
          echo "SSH directory created: ${HOME}/.ssh"
          
          # Write SSH key (using printf to preserve exact content)
          echo "Writing SSH key..."
          printf "%s" "${{ secrets.EC2_SSH_KEY }}" > "${HOME}/.ssh/ec2_key"
          chmod 600 "${HOME}/.ssh/ec2_key"
          echo "SSH key written and permissions set"
          
          echo "SSH key setup complete"

      - name: Scan SSH host keys with retry
        shell: bash
        run: |
          echo "=== SSH Host Key Scanning ==="
          echo "Scanning host: ${{ secrets.EC2_HOST }}"
          
          # Configuration
          SSH_HOST="${{ secrets.EC2_HOST }}"
          SSH_PORT="${{ secrets.EC2_PORT || 22 }}"
          RETRY_COUNT=0
          MAX_RETRIES=5
          BACKOFF_DELAY=2
          KEYSCAN_SUCCESS=false
          STDERR_FILE="/tmp/ssh-keyscan-stderr.txt"
          STDOUT_FILE="/tmp/ssh-keyscan-stdout.txt"
          
          # Ensure known_hosts file exists
          touch "${HOME}/.ssh/known_hosts"
          chmod 644 "${HOME}/.ssh/known_hosts"
          
          # Retry loop with exponential backoff
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            RETRY_COUNT=$((RETRY_COUNT + 1))
            echo ""
            echo "Attempt $RETRY_COUNT of $MAX_RETRIES:"
            echo "  Running: ssh-keyscan -p $SSH_PORT -T 10 -H $SSH_HOST"
            
            # Run ssh-keyscan with explicit port and timeout
            # -p: port number
            # -T: timeout in seconds
            # -H: hash the hostname in known_hosts
            # -v: verbose output (to stderr)
            if ssh-keyscan -p "$SSH_PORT" -T 10 -H "$SSH_HOST" > "$STDOUT_FILE" 2> "$STDERR_FILE"; then
              KEYSCAN_EXIT_CODE=0
            else
              KEYSCAN_EXIT_CODE=$?
            fi
            
            # Check if we got any keys
            if [ $KEYSCAN_EXIT_CODE -eq 0 ] && [ -s "$STDOUT_FILE" ]; then
              echo "  ✓ ssh-keyscan succeeded (exit code: 0)"
              
              # Show what keys were found
              KEY_COUNT=$(wc -l < "$STDOUT_FILE")
              echo "  ✓ Received $KEY_COUNT host key(s)"
              
              # Append to known_hosts
              cat "$STDOUT_FILE" >> "${HOME}/.ssh/known_hosts"
              echo "  ✓ Keys added to known_hosts"
              
              KEYSCAN_SUCCESS=true
              break
            else
              echo "  ✗ ssh-keyscan failed (exit code: $KEYSCAN_EXIT_CODE)"
              
              # Show stderr if available
              if [ -s "$STDERR_FILE" ]; then
                echo ""
                echo "  === ssh-keyscan stderr output ==="
                sed 's/^/  /' "$STDERR_FILE"
                echo "  ================================="
              fi
              
              # Show stdout if available (might be empty)
              if [ -s "$STDOUT_FILE" ]; then
                echo ""
                echo "  === ssh-keyscan stdout output ==="
                sed 's/^/  /' "$STDOUT_FILE"
                echo "  =================================="
              else
                echo "  (no host keys received)"
              fi
              
              # Clean up for next attempt
              rm -f "$STDOUT_FILE" "$STDERR_FILE"
              
              # Exponential backoff if not the last attempt
              if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                echo "  ⏳ Waiting ${BACKOFF_DELAY}s before retry..."
                sleep $BACKOFF_DELAY
                BACKOFF_DELAY=$((BACKOFF_DELAY * 2))
              fi
            fi
          done
          
          # Final check
          echo ""
          if [ "$KEYSCAN_SUCCESS" = "true" ]; then
            echo "✅ SSH host key scanning completed successfully"
            echo "   Host keys saved to: ${HOME}/.ssh/known_hosts"
          else
            echo "❌ ERROR: ssh-keyscan failed after $MAX_RETRIES attempts"
            echo ""
            echo "Troubleshooting steps:"
            echo "  1. Verify host is reachable (see network diagnostics above)"
            echo "  2. Check EC2 security group allows SSH from GitHub Actions IPs"
            echo "  3. Verify EC2 instance is running and SSH daemon is active"
            echo "  4. Review stderr output above for specific error messages"
            echo ""
            echo "Alternative deployment methods:"
            echo "  - Use self-hosted runner on same VPC (recommended for private hosts)"
            echo "  - Use AWS SSM Session Manager instead of SSH (no open ports needed)"
            echo "  - Use AWS CodeDeploy for automated deployments"
            echo ""
            exit 1
          fi
          
          # Cleanup temp files
          rm -f "$STDOUT_FILE" "$STDERR_FILE"

      - name: Bootstrap Docker prerequisites on EC2
        run: |
          ssh -i "${HOME}/.ssh/ec2_key" -o StrictHostKeyChecking=no \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} 'bash -s' << 'ENDSSH'
          set -e
          
          echo "Checking Docker prerequisites..."
          
          # Check if Docker is installed
          if ! command -v docker &> /dev/null; then
            echo "Docker not found. Installing Docker..."
            sudo apt-get update -qq
            sudo apt-get install -y docker.io
            sudo systemctl enable docker
            sudo systemctl start docker
            echo "Docker installed successfully"
          else
            echo "Docker already installed: $(docker --version)"
          fi
          
          # Check if Docker Compose plugin is installed
          if ! docker compose version &> /dev/null; then
            echo "Docker Compose plugin not found. Installing..."
            sudo apt-get update -qq
            sudo apt-get install -y docker-compose-plugin
            echo "Docker Compose plugin installed successfully"
          else
            echo "Docker Compose already installed: $(docker compose version)"
          fi
          
          # Add user to docker group if not already a member
          if ! groups | grep -q docker; then
            echo "Adding user to docker group..."
            sudo usermod -aG docker $USER
            echo "User added to docker group (will take effect on next login)"
          else
            echo "User already in docker group"
          fi
          
          # Verify Docker is working
          # Use sudo for verification if user not in docker group yet
          if groups | grep -q docker; then
            echo "Verifying Docker access..."
            docker ps > /dev/null 2>&1 || sudo docker ps > /dev/null
            echo "Docker verification successful"
          else
            echo "Verifying Docker with sudo (group membership requires re-login)..."
            sudo docker ps > /dev/null
            echo "Docker verification successful (running as sudo)"
          fi
          
          echo "Docker prerequisites check complete"
          ENDSSH

      - name: Create deployment directory on EC2
        run: |
          ssh -i "${HOME}/.ssh/ec2_key" -o StrictHostKeyChecking=no \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "sudo mkdir -p /opt/f1-race-insights/deploy && \
             sudo chown -R ${{ secrets.EC2_USER }}:${{ secrets.EC2_USER }} /opt/f1-race-insights"

      - name: Copy deployment files to EC2
        run: |
          # Copy deploy scripts and configuration
          scp -i "${HOME}/.ssh/ec2_key" -o StrictHostKeyChecking=no -r \
            deploy/* \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/opt/f1-race-insights/deploy/

      - name: Create .env.prod on EC2
        run: |
          ssh -i "${HOME}/.ssh/ec2_key" -o StrictHostKeyChecking=no \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "echo '${{ secrets.PROD_ENV_FILE_B64 }}' | base64 -d > /opt/f1-race-insights/deploy/.env.prod"

      - name: Validate .env.prod on EC2
        run: |
          ssh -i "${HOME}/.ssh/ec2_key" -o StrictHostKeyChecking=no \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "test -s /opt/f1-race-insights/deploy/.env.prod && \
             grep -q '^DOCKER_REGISTRY=' /opt/f1-race-insights/deploy/.env.prod && \
             grep -q '^S3_BUCKET=' /opt/f1-race-insights/deploy/.env.prod && \
             echo 'Validation passed: .env.prod file exists and contains required variables' || \
             (echo 'Validation failed: .env.prod file is missing or incomplete' && exit 1)"

      - name: Login to GitHub Container Registry on EC2
        run: |
          ssh -i "${HOME}/.ssh/ec2_key" -o StrictHostKeyChecking=no \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u ${{ github.actor }} --password-stdin"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run CI Gate
        run: bash scripts/ci_gate.sh

      - name: Run deployment script
        run: |
          ssh -i "${HOME}/.ssh/ec2_key" -o StrictHostKeyChecking=no \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "cd /opt/f1-race-insights && bash deploy/ec2_deploy.sh"

      - name: Verify deployment
        run: |
          ssh -i "${HOME}/.ssh/ec2_key" -o StrictHostKeyChecking=no \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "docker compose -f /opt/f1-race-insights/deploy/docker-compose.prod.yml ps"

      - name: Cleanup SSH key
        if: always()
        run: rm -f "${HOME}/.ssh/ec2_key"
