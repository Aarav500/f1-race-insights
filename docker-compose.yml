version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    image: f1-api:latest
    container_name: f1-race-insights-api
    ports:
      - "8000:8000"
    env_file:
      - .env # Load environment variables from .env file
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - DATA_DIR=/app/data
      - MODEL_DIR=/app/models
      - CACHE_DIR=/app/data/cache
      - FASTF1_CACHE=/app/data/fastf1_cache
      # Database connection (if using postgres)
      - DATABASE_URL=postgresql://${POSTGRES_USER:-f1user}:${POSTGRES_PASSWORD:-f1password}@db:5432/${POSTGRES_DB:-f1db}
    volumes:
      # Development: mount repo for live reload (comment out for production)
      - .:/app
      # Persistent FastF1 cache across restarts
      - fastf1-cache:/app/data/fastf1_cache
      # Persistent data cache
      - data-cache:/app/data/cache
      # Persistent reports storage
      - reports:/app/reports
      # Mount models directory (read-only for production)
      - ./models:/app/models:ro
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    depends_on:
      - db
    networks:
      - f1-network
    # Resource limits (adjust based on your needs)
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
    image: f1-web:latest
    container_name: f1-race-insights-web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://api:8000
      - NODE_ENV=development
    volumes:
      # Development: mount web directory for live reload
      - ./web:/app
      - /app/node_modules # Prevents overwriting node_modules from host
      - /app/.next # Prevents overwriting build artifacts from host
    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:3000/', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - f1-network

  # Optional PostgreSQL database for future persistence
  db:
    image: postgres:15-alpine
    container_name: f1-race-insights-db
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-f1user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-f1password}
      - POSTGRES_DB=${POSTGRES_DB:-f1db}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-f1user}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - f1-network
    # Uncomment to disable database (if not needed)
    # profiles:
    #   - with-db

    # Named volumes for data persistence
volumes:
  postgres-data:
    name: f1-postgres-data
  fastf1-cache:
    name: f1-fastf1-cache
  data-cache:
    name: f1-data-cache
  reports:
    name: f1-reports

# Network for service communication
networks:
  f1-network:
    name: f1-network
    driver: bridge
